{% extends "visionary_ai/index.html" %}
{% block 'title' %}404{% endblock 'title' %}

{% block 'hero' %}

<div class="min-h-screen flex items-center justify-center px-4 bg-gray-950">

    <div class="text-center max-w-md">

        <!-- Big Error Code -->
        <h1 class="text-8xl font-bold text-red-500">
            404
        </h1>

        <!-- Message -->
        <h2 class="text-2xl font-semibold text-white mt-4">
            Page Not Found
        </h2>

        <p class="text-gray-400 mt-3">
            The page you are looking for doesn’t exist or has been moved.
        </p>

        <!-- Buttons -->
        <div class="mt-8 flex flex-col sm:flex-row gap-4 justify-center">

            <a href="/VisionaryAI/home"
               class="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl transition">
                Go Home
            </a>

            <a href="javascript:history.back()"
               class="px-6 py-3 bg-gray-700 hover:bg-gray-600 text-white rounded-xl transition">
                Go Back
            </a>

        </div>

        <!-- Optional hint -->
        <p class="text-gray-600 text-sm mt-6">
            If you think this is a mistake, check the URL and try again.
        </p>

    </div>

</div>
{% endblock 'hero' %}
